name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Enforce least-privilege security permissions
permissions:
  contents: read

# Cancel older runs on active PRs to save action minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run JavaScript Linter
        run: npm run lint:js